<script>
window.generateListHTML = function(items) {
  var dateStr = new Date().toLocaleDateString('en-US', {month:'long',day:'numeric',year:'numeric'});
  var dataJson = JSON.stringify(items);
  var css = [
    '*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}',
    'body{font-family:Outfit,sans-serif;background:#FAF7F2;color:#1C1C1E;min-height:100vh;padding-bottom:100px}',
    '.header{background:#fff;border-bottom:1px solid #E8E3DB;padding:20px 20px 0;position:sticky;top:0;z-index:10}',
    '.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}',
    'h1{font-size:22px;font-weight:800}',
    '.dt{font-size:12px;color:#6B6B70}',
    '.pl{font-size:13px;font-weight:700;color:#2A8B68}',
    '.pw{background:#E8E3DB;border-radius:4px;height:4px;width:80px;margin-top:4px;margin-left:auto;overflow:hidden}',
    '.pf{height:100%;background:#2A8B68;border-radius:4px}',
    '.tabs{display:flex}',
    '.tab{flex:1;padding:12px 0;text-align:center;font-size:14px;font-weight:700;border:none;background:none;cursor:pointer;color:#6B6B70;border-bottom:3px solid transparent}',
    '.tab.active{color:#1C1C1E;border-bottom-color:#1C1C1E}',
    '.sec{padding:20px 20px 0}',
    '.slbl{font-size:11px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:#6B6B70;margin-bottom:12px;margin-top:8px}',
    '.item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:#fff;border-radius:14px;border:1px solid #E8E3DB;margin-bottom:8px}',
    '.item.done{background:#EDF7F2;border-color:#A8D5C2}',
    '.ck{width:24px;height:24px;border-radius:8px;border:2px solid #E8E3DB;background:transparent;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}',

    '.it{font-size:15px;line-height:1.4;flex:1;padding-top:2px}',
    '.it.done{color:#6B6B70;text-decoration:line-through}',
    '.dl{background:none;border:none;color:#D4CFC8;font-size:20px;cursor:pointer;padding:0 2px}',
    '.add{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E8E3DB;padding:12px 20px;padding-bottom:max(12px,env(safe-area-inset-bottom));display:flex;gap:10px}',
    '.inp{flex:1;border:1px solid #E8E3DB;border-radius:12px;padding:12px 14px;font-size:15px;font-family:Outfit,sans-serif;outline:none;background:#FAF7F2}',
    '.addbtn{background:#2A8B68;color:#fff;border:none;border-radius:12px;padding:12px 18px;font-size:18px;font-weight:700;cursor:pointer}',
    '.empty{text-align:center;padding:40px 20px;color:#6B6B70;font-size:15px}',
    '.hint{margin:16px 20px 0;background:#EDF7F2;border:1px solid #A8D5C2;border-radius:14px;padding:14px 16px;display:none}',
    '.hp{font-size:13px;color:#2A8B68;font-weight:600;margin-bottom:4px}',
    '.hs{font-size:12px;color:#6B6B70;line-height:1.5;display:block}'

  var js = '(function(){'
    + 'var BAKED=' + dataJson + ';'
    + 'var LSKEY="ourlist_" + BAKED.chad.length + "_" + BAKED.joelle.length;'
    + 'var data=JSON.parse(JSON.stringify(BAKED));'
    + 'try{var s=localStorage.getItem(LSKEY);if(s){var d=JSON.parse(s);if(d&&d.chad&&d.joelle)data=d;}}catch(e){}'
    + 'var cur="chad";'
    + 'function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}'
    + 'function save(){try{localStorage.setItem(LSKEY,JSON.stringify(data));}catch(e){}}'
    + 'function render(){'
    +   'var all=data.chad.concat(data.joelle);'
    +   'var done=all.filter(function(i){return i.done;}).length;'
    +   'var prog=document.getElementById("prog");if(prog)prog.textContent=done+"/"+all.length+" done";'
    +   'var pf=document.getElementById("pf");if(pf)pf.style.width=all.length?((done/all.length)*100)+"%":"0%";'
    +   'var c=document.getElementById("list");c.innerHTML="";'
    +   'var people=cur==="all"?["chad","joelle"]:[cur];'
    +   'var names={chad:"\u{1F466} Chad",joelle:"\u{1F469} Joelle"};'
    +   'people.forEach(function(p){'
    +     'if(cur==="all"){var lbl=document.createElement("div");lbl.className="slbl";lbl.textContent=names[p];c.appendChild(lbl);}'
    +     'if(!data[p].length){if(cur!=="all"){var e=document.createElement("div");e.className="empty";e.textContent="No items yet — add one below!";c.appendChild(e);}return;}'
    +     'data[p].forEach(function(item){'
    +       'var d=document.createElement("div");d.className="item"+(item.done?" done":"");'
    +       'var ckDiv=document.createElement("div");ckDiv.className="ck"+(item.done?" on":"");'
    +       'if(item.done){ckDiv.textContent="\u2713";}'
    +       'ckDiv.setAttribute("onclick","tog(\""+p+"\","+item.id+")");'
    +       'var txt=document.createElement("span");txt.className="it"+(item.done?" done":"");txt.textContent=item.text;'
    +       'var del=document.createElement("button");del.className="dl";del.textContent="\u00d7";'
    +       'del.setAttribute("onclick","del2(\""+p+"\","+item.id+")");'
    +       'd.appendChild(ckDiv);d.appendChild(txt);d.appendChild(del);c.appendChild(d);'
    +     '});'
    +   '});'
    + '}'
    + 'window.sw=function(t){'
    +   'cur=t;'
    +   '["chad","joelle","all"].forEach(function(x){var el=document.getElementById("t"+x.charAt(0).toUpperCase()+x.slice(1));if(el)el.classList.toggle("active",x===t);});'
    +   'var inp=document.getElementById("inp");'
    +   'if(t==="all"){inp.disabled=true;inp.style.opacity="0.5";inp.placeholder="Switch to a person tab to add";}' 
    +   'else{inp.disabled=false;inp.style.opacity="1";inp.placeholder="Add an item for "+(t==="chad"?"Chad":"Joelle")+"...";}'
    +   'render();'
    + '};'
    + 'window.addItem=function(){'
    +   'if(cur==="all")return;'
    +   'var v=document.getElementById("inp").value.trim();if(!v)return;'
    +   'data[cur].push({text:v,done:false,id:Date.now()});'
    +   'save();document.getElementById("inp").value="";render();'
    + '};'
    + 'window.tog=function(p,id){'
    +   'var item=data[p].find(function(x){return x.id===id;});'
    +   'if(item){item.done=!item.done;save();render();}'
    + '};'
    + 'window.del2=function(p,id){'
    +   'data[p]=data[p].filter(function(x){return x.id!==id;});'
    +   'save();render();'
    + '};'
    + 'document.getElementById("inp").addEventListener("keydown",function(e){if(e.key==="Enter")addItem();});'
    + 'if(/^((?!chrome|android).)*safari/i.test(navigator.userAgent)&&!navigator.standalone){document.getElementById("hint").style.display="block";}'
    + 'render();'
    + '})();';

  return '<!DOCTYPE html>'
    + '<html lang="en"><head>'
    + '<meta charset="UTF-8">'
    + '<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">'
    + '<meta name="apple-mobile-web-app-capable" content="yes">'
    + '<meta name="apple-mobile-web-app-title" content="Our List">'
    + '<title>Our List - Stewart Family</title>'
    + '<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">'
    + '<style>' + css + '</style>'
    + '</head><body>'
    + '<div class="header">'
    +   '<div class="top"><div><h1>&#x1F49A; Our List</h1><p class="dt">' + dateStr + '</p></div>'
    +   '<div style="text-align:right"><p class="pl" id="prog"></p><div class="pw"><div class="pf" id="pf" style="width:0%"></div></div></div></div>'
    +   '<div class="tabs">'
    +   '<button class="tab active" id="tChad" onclick="sw(&apos;chad&apos;)">&#x1F466; Chad</button>'
    +   '<button class="tab" id="tJoelle" onclick="sw(&apos;joelle&apos;)">&#x1F469; Joelle</button>'
    +   '<button class="tab" id="tAll" onclick="sw(&apos;all&apos;)">&#x1F4CB; All</button>'
    +   '</div>'
    + '</div>'
    + '<div class="hint"><p class="hp">&#x1F4F1; Add to home screen</p><span class="hs">Tap Share in Safari → "Add to Home Screen"</span></div>'
    + '<div class="sec" id="list" style="margin-bottom:90px"></div>'
    + '<div class="add"><input class="inp" id="inp" placeholder="Add an item for Chad..."><button class="addbtn" onclick="addItem()">+</button></div>'
    + '<script>' + js + '<' + '/script>'
    + '</body></html>';
};
</script>

// ─── SUPABASE ─────────────────────────────────────────────────────────────────
const SUPABASE_URL     = 'https://pwxtcdutncsbnffvaszh.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable__l5FPA2OKH-sPI0TP0E4Xg_HxpGr9ni';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const FAMILY_ID = 'stewarts';
let currentSessionId = null;

// Live data — starts as DEFAULT_D, updated after Supabase load completes
let D = DEFAULT_D;

// Populated by db.init() before first render; components read from here
const INIT = { todos: { chad: [], joelle: [] }, priorities: ['','',''], notes: [], upcomingNotes: ['','','','',''] };

const mergeD = (saved) => {
  if (!saved || !Object.keys(saved).length) return DEFAULT_D;
  return {
    ...DEFAULT_D, ...saved,
    date: DEFAULT_D.date,
    accounts:     { ...DEFAULT_D.accounts, ...(saved.accounts || {}) },
    income:       { total: saved.income?.total ?? DEFAULT_D.income.total, sources: saved.income?.sources ?? DEFAULT_D.income.sources },
    spending:     saved.spending     ?? DEFAULT_D.spending,
    fixedBills:   saved.fixedBills   ?? DEFAULT_D.fixedBills,
    variableSpend: saved.variableSpend ?? DEFAULT_D.variableSpend,
    deficit:      saved.deficit      ?? DEFAULT_D.deficit,
  };
};

const db = {
  async init() {
    // Find open session or create one
    const { data: sessions } = await sb.from('sessions')
      .select().eq('family_id', FAMILY_ID).is('completed_at', null)
      .order('created_at', { ascending: false }).limit(1);
    let session = sessions?.[0];
    if (!session) {
      const { data } = await sb.from('sessions')
        .insert({ family_id: FAMILY_ID, session_date: new Date().toISOString().split('T')[0] })
        .select().single();
      session = data;
    }
    currentSessionId = session.id;

    const [budgetRes, todosRes, priRes, notesRes, upcomingRes] = await Promise.all([
      sb.from('budget_data').select('data').eq('family_id', FAMILY_ID).single(),
      sb.from('todos').select('*').eq('session_id', currentSessionId).order('sort_order'),
      sb.from('priorities').select('*').eq('session_id', currentSessionId).order('slot'),
      sb.from('notes').select('*').eq('session_id', currentSessionId).order('sort_order'),
      sb.from('upcoming_notes').select('*').eq('family_id', FAMILY_ID).order('slot'),
    ]);

    D = mergeD(budgetRes.data?.data);

    const allTodos = todosRes.data || [];
    const pris     = priRes.data   || [];
    const uNotes   = upcomingRes.data || [];

    Object.assign(INIT, {
      todos: {
        chad:   allTodos.filter(t => t.person === 'chad').map(t => ({ id: t.id, text: t.text, done: t.done })),
        joelle: allTodos.filter(t => t.person === 'joelle').map(t => ({ id: t.id, text: t.text, done: t.done })),
      },
      priorities:    [0,1,2].map(i => pris.find(p => p.slot === i+1)?.text ?? ''),
      notes:         (notesRes.data || []).map(n => ({ id: n.id, text: n.text })),
      upcomingNotes: [1,2,3,4,5].map(i => uNotes.find(u => u.slot === i)?.text ?? ''),
    });
  },

  async addTodo(person, text, sortOrder) {
    const { data } = await sb.from('todos').insert({
      family_id: FAMILY_ID, session_id: currentSessionId,
      person, text, done: false, sort_order: sortOrder,
    }).select().single();
    return data;
  },
  toggleTodo(id, done) {
    sb.from('todos').update({ done, updated_at: new Date().toISOString() }).eq('id', id)
      .then(r => { if (r.error) console.error('toggleTodo failed:', r.error); });
  },
  deleteTodo(id) {
    sb.from('todos').delete().eq('id', id)
      .then(r => { if (r.error) console.error('deleteTodo failed:', r.error); });
  },

  savePriority(slot, text) {
    sb.from('priorities').upsert(
      { family_id: FAMILY_ID, session_id: currentSessionId, slot, text, updated_at: new Date().toISOString() },
      { onConflict: 'session_id,slot' }
    ).then(r => { if (r.error) console.error('savePriority failed:', r.error); });
  },

  async addNote(text, sortOrder) {
    const { data } = await sb.from('notes').insert({
      family_id: FAMILY_ID, session_id: currentSessionId, text, sort_order: sortOrder,
    }).select().single();
    return data;
  },
  deleteNote(id) {
    sb.from('notes').delete().eq('id', id)
      .then(r => { if (r.error) console.error('deleteNote failed:', r.error); });
  },

  saveUpcomingNote(slot, text) {
    sb.from('upcoming_notes').upsert(
      { family_id: FAMILY_ID, slot, text, updated_at: new Date().toISOString() },
      { onConflict: 'family_id,slot' }
    ).then(r => { if (r.error) console.error('saveUpcomingNote failed:', r.error); });
  },

  async saveBudgetData(data) {
    await sb.from('budget_data').upsert(
      { family_id: FAMILY_ID, data, updated_at: new Date().toISOString(), updated_by: 'chad' },
      { onConflict: 'family_id' }
    );
  },

  async newSession(rolledTodos) {
    await sb.from('sessions').update({ completed_at: new Date().toISOString() }).eq('id', currentSessionId);
    const { data } = await sb.from('sessions')
      .insert({ family_id: FAMILY_ID, session_date: new Date().toISOString().split('T')[0] })
      .select().single();
    currentSessionId = data.id;
    if (rolledTodos.length) {
      await sb.from('todos').insert(
        rolledTodos.map((item, i) => ({
          family_id: FAMILY_ID, session_id: currentSessionId,
          person: item.person, text: item.text, done: false, sort_order: i,
        }))
      );
    }
  },

  async loadTodos() {
    const { data } = await sb.from('todos').select('*').eq('session_id', currentSessionId).order('sort_order');
    const rows = data || [];
    return {
      chad:   rows.filter(t => t.person === 'chad').map(t => ({ id: t.id, text: t.text, done: t.done })),
      joelle: rows.filter(t => t.person === 'joelle').map(t => ({ id: t.id, text: t.text, done: t.done })),
    };
  },
  async loadPriorities() {
    const { data } = await sb.from('priorities').select('*').eq('session_id', currentSessionId).order('slot');
    return [0,1,2].map(i => data?.find(p => p.slot === i+1)?.text ?? '');
  },
  async loadNotes() {
    const { data } = await sb.from('notes').select('*').eq('session_id', currentSessionId).order('sort_order');
    return (data || []).map(n => ({ id: n.id, text: n.text }));
  },
};

// ─── SESSION IMPORT PARSER ────────────────────────────────────────────────────
const parseExport = (text) => {
  const result = { chad: [], joelle: [], priorities: ['','',''], notes: [] };
  let section = null;
  const lines = text.split('\n');
  lines.forEach(raw => {
    const line = raw.trim();
    if (line.includes("CHAD'S TO-DOS") || line === '--- Chad ---') { section = 'chad'; return; }
    if (line.includes("JOELLE'S TO-DOS") || line === '--- Joelle ---') { section = 'joelle'; return; }
    if (line.includes('PRIORITIES')) { section = 'priorities'; return; }
    if (line.includes('NOTES')) { section = 'notesSection'; return; }
    if (line.startsWith('---') || line.startsWith('===') || !line) return;

    if (section === 'chad' || section === 'joelle') {
      const done = line.startsWith('[x]');
      const notDone = line.startsWith('[ ]');
      if (done || notDone) {
        result[section].push({ text: line.slice(4).trim(), done, id: Date.now() + Math.random() });
      }
    }
    if (section === 'priorities') {
      const m = line.match(/^Goal #(\d):\s*(.+)/);
      if (m) result.priorities[parseInt(m[1])-1] = m[2];
    }
    if (section === 'notesSection') {
      const m = line.match(/^\d+\.\s*(.+)/);
      if (m) result.notes.push({ text: m[1], id: Date.now() + Math.random() });
    }
  });
  return result;
};

    const t = input.trim();
    if (!t || (tab !== 'chad' && tab !== 'joelle')) return;
    try {
      const data = await db.addTodo(tab, t, items[tab].length);
      setItems(prev => ({ ...prev, [tab]: [...prev[tab], { id: data.id, text: t, done: false }] }));
      setInput('');
    } catch (err) {
      console.error('addTodo failed:', err);
      setAddError('Failed to save — check connection');
      setTimeout(() => setAddError(null), 4000);
    }
  };
  const toggle = (p, id) => {
    const done = !items[p].find(i => i.id === id).done;
    setItems(prev => ({ ...prev, [p]: prev[p].map(i => i.id === id ? { ...i, done } : i) }));
    db.toggleTodo(id, done);
  };
  const remove = (p, id) => {
    setItems(prev => ({ ...prev, [p]: prev[p].filter(i => i.id !== id) }));
    db.deleteTodo(id);
  };
  const updatePriority = (i, val) => {
    const n = [...priorities]; n[i] = val; setPriorities(n);
    db.savePriority(i + 1, val);
  };
  const addNote = async () => {
    const t = noteInput.trim(); if (!t) return;
    try {
      const data = await db.addNote(t, notesList.length);
      setNotesList(prev => [...prev, { id: data.id, text: t }]);
      setNoteInput('');
    } catch (err) {
      console.error('addNote failed:', err);
      setAddError('Failed to save — check connection');
      setTimeout(() => setAddError(null), 4000);
    }
  };
  const removeNote = (id) => {
    setNotesList(prev => prev.filter(n => n.id !== id));
    db.deleteNote(id);
  };

  const allTotal = items.chad.length + items.joelle.length;
  const allDone = items.chad.filter(i=>i.done).length + items.joelle.filter(i=>i.done).length;

  const TABS = [
    { id:'chad', label:'👦 Chad', count: items.chad.length, done: items.chad.filter(i=>i.done).length },
    { id:'joelle', label:'👩 Joelle', count: items.joelle.length, done: items.joelle.filter(i=>i.done).length },
    { id:'all', label:'All' },
    { id:'goals', label:'📌 Goals' },
  ];

  // ── Mobile layout ──────────────────────────────────────────────────────────
  if (mobile) {
    const showInput = tab === 'chad' || tab === 'joelle';
    const showNoteInput = tab === 'goals';
    const inputPerson = tab === 'chad' ? 'Chad' : 'Joelle';

    return (
      <div style={{ display:'flex', flexDirection:'column', height:'100dvh', background:T.cream, overflow:'hidden', position:'fixed', inset:0 }}>

        <div style={{ background:'#fff', borderBottom:`1px solid ${T.border}`, padding:'16px 20px 0', flexShrink:0 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
            <button onClick={() => { window.location.hash = 'welcome'; }} style={{ background:'none', border:'none', padding:0, cursor:'pointer', textAlign:'left' }}>
              <p style={{ fontWeight:800, fontSize:20 }}>💚 Cadence</p>
              <p style={{ fontSize:12, color:T.dim }}>{allDone}/{allTotal} items done</p>
            </button>
            <div style={{ width:80 }}>
              <Bar val={allDone} max={allTotal||1} color={T.green} h={6} />
            </div>
          </div>
          {/* Tabs */}
          <div style={{ display:'flex', borderBottom:`1px solid ${T.border}`, marginLeft:-20, marginRight:-20, paddingLeft:20, paddingRight:20, overflowX:'auto', WebkitOverflowScrolling:'touch', scrollbarWidth:'none' }}>
            {TABS.map(t => (
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                background:'none', border:'none', padding:'10px 14px', fontSize:14, fontWeight:700,
                color: tab===t.id ? T.ink : T.dim, cursor:'pointer', flexShrink:0, whiteSpace:'nowrap',
                borderBottom:`3px solid ${tab===t.id ? T.green : 'transparent'}`, transition:'color .15s'
              }}>
                {t.label}
                {t.count > 0 && <span style={{ marginLeft:5, fontSize:11, color: t.done===t.count ? T.green : T.dim }}>({t.done}/{t.count})</span>}

          </div>
        </div>

        {/* Scrollable content */}
        <div style={{ flex:1, overflowY:'auto', padding:'12px 16px', WebkitOverflowScrolling:'touch' }}>

          {/* Chad / Joelle tabs */}
          {(tab==='chad' || tab==='joelle') && (
            <div style={{ paddingBottom: showInput ? 90 : 24 }}>
              {items[tab].length === 0 && (
                <div style={{ textAlign:'center', padding:'60px 20px', color:T.dim }}>
                  <p style={{ fontSize:40, marginBottom:12 }}>✅</p>
                  <p style={{ fontSize:16, fontWeight:600 }}>All clear!</p>

                  background: item.done ? T.greenBg : '#fff', border:`1px solid ${item.done ? T.greenMid : T.border}`,
                  borderRadius:16, padding:'16px 18px', minHeight:60, transition:'all .15s' }}>
                  <div onClick={()=>toggle(tab, item.id)} style={{
                    width:28, height:28, borderRadius:9, border:`2.5px solid ${item.done ? T.green : '#C8C8CC'}`,
                    background: item.done ? T.green : 'transparent', flexShrink:0, cursor:'pointer',
                    display:'flex', alignItems:'center', justifyContent:'center', transition:'all .15s'
                  }}>
                    {item.done && <span style={{ color:'#fff', fontSize:14, fontWeight:800, lineHeight:1 }}>✓</span>}
                  </div>
                  <p onClick={()=>toggle(tab, item.id)} style={{ flex:1, fontSize:16, color: item.done ? T.dim : T.ink, textDecoration: item.done ? 'line-through' : 'none', lineHeight:1.4, cursor:'pointer' }}>{item.text}</p>
                  <button onClick={()=>remove(tab, item.id)} style={{ background:'none', border:'none', cursor:'pointer', color:'#C8C8CC', fontSize:22, padding:'0 2px', lineHeight:1, minWidth:32, minHeight:32, display:'flex', alignItems:'center', justifyContent:'center' }}>×</button>
                </div>

            </div>
          )}

          {/* All tab */}
          {tab==='all' && (
            <div style={{ paddingBottom:24 }}>
              {['chad','joelle'].map(p => (
                <div key={p} style={{ marginBottom:24 }}>
                  <p style={{ fontSize:13, fontWeight:800, letterSpacing:1, textTransform:'uppercase', color:T.dim, marginBottom:10, marginTop:8 }}>{p==='chad'?'👦 Chad':'👩 Joelle'}</p>

                  {items[p].map(item => (
                    <div key={item.id} onClick={()=>toggle(p, item.id)} style={{
                      display:'flex', alignItems:'center', gap:12, marginBottom:8, cursor:'pointer',
                      background: item.done ? T.greenBg : '#fff', border:`1px solid ${item.done ? T.greenMid : T.border}`,
                      borderRadius:14, padding:'14px 16px', minHeight:52

                      <div style={{ width:24, height:24, borderRadius:7, border:`2px solid ${item.done ? T.green : '#C8C8CC'}`, background: item.done ? T.green : 'transparent', flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center' }}>

                      </div>
                      <p style={{ flex:1, fontSize:15, color: item.done ? T.dim : T.ink, textDecoration: item.done ? 'line-through' : 'none' }}>{item.text}</p>

              ))}
            </div>
          )}

          {/* Goals & Notes tab */}
          {tab==='goals' && (
            <div style={{ paddingBottom: 100 }}>
              <p style={{ fontSize:13, fontWeight:800, letterSpacing:1, textTransform:'uppercase', color:T.dim, marginBottom:12, marginTop:8 }}>Our 3 Priorities</p>
              {priorities.map((p, i) => (
                <div key={i} style={{ display:'flex', alignItems:'center', gap:12, background: T.greenBg, border:`1px solid ${T.greenMid}`, borderRadius:14, padding:'14px 16px', marginBottom:10 }}>
                  <span style={{ fontSize:16, fontWeight:800, color:T.green, flexShrink:0, width:24 }}>#{i+1}</span>
                  <input value={p} onChange={e=>updatePriority(i, e.target.value)} placeholder={`Priority #${i+1}...`}
                    style={{ flex:1, border:'none', outline:'none', background:'transparent', fontFamily:'inherit', fontSize:16, color:T.ink }} />
                </div>
              ))}
              <p style={{ fontSize:13, fontWeight:800, letterSpacing:1, textTransform:'uppercase', color:T.dim, marginBottom:8, marginTop:20 }}>Notes</p>
              <p style={{ fontSize:13, color:T.dim, marginBottom:12, lineHeight:1.5 }}>Thoughts, tangents, things to remember — not necessarily actionable.</p>
              {notesList.map((n, i) => (
                <div key={n.id} style={{ display:'flex', alignItems:'flex-start', gap:10, padding:'12px 0', borderBottom:`1px solid ${T.border}` }}>
                  <span style={{ fontSize:14, color:T.dim, marginTop:2, flexShrink:0, width:20 }}>{i+1}.</span>
                  <p style={{ flex:1, fontSize:15, color:T.ink, lineHeight:1.5 }}>{n.text}</p>
                  <button onClick={()=>removeNote(n.id)} style={{ background:'none', border:'none', cursor:'pointer', color:'#C8C8CC', fontSize:20, padding:'0 4px', minWidth:32, minHeight:32 }}>×</button>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Fixed bottom input bar */}
        {(showInput || showNoteInput) && (
          <div style={{ background:'#fff', borderTop:`1px solid ${T.border}`, padding:`12px 16px`, paddingBottom:`max(12px, env(safe-area-inset-bottom))`, flexShrink:0 }}>
            {addError && <p style={{ fontSize:12, color:T.coral, marginBottom:8 }}>{addError}</p>}
            <div style={{ display:'flex', gap:10 }}>
              <input
                value={showInput ? input : noteInput}
                onChange={e => showInput ? setInput(e.target.value) : setNoteInput(e.target.value)}
                onKeyDown={e => e.key==='Enter' && (showInput ? add() : addNote())}
                placeholder={showInput ? `Add to ${inputPerson}'s list...` : 'Add a note...'}
                style={{ flex:1, border:`1.5px solid ${T.border}`, borderRadius:14, padding:'14px 18px', fontSize:16, outline:'none', fontFamily:'inherit', background:T.cream }}
              />
              <button onClick={showInput ? add : addNote} style={{ background: showInput ? T.green : T.amber, color:'#fff', border:'none', borderRadius:14, padding:'14px 20px', fontSize:20, fontWeight:800, cursor:'pointer', minWidth:52 }}>+</button>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── Desktop layout ─────────────────────────────────────────────────────────
  return (
    <div style={{ padding:'32px 48px', maxWidth:920, margin:'0 auto' }}>
      <SectionHeader tag="Our Lists" tagColor="green" title="Cadence Lists" sub="Your shared todos, priorities & notes — accessible from any screen via the ✅ bubble." />
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:20 }}>
        <div style={{ display:'flex', gap:8 }}>
          {TABS.map(t => (
            <button key={t.id} onClick={()=>setTab(t.id)} style={{ background: tab===t.id ? T.ink : T.card, color: tab===t.id ? '#fff' : T.dim, border:`1px solid ${tab===t.id ? T.ink : T.border}`, borderRadius:100, padding:'7px 18px', fontSize:13, fontWeight:700, cursor:'pointer' }}>{t.label}{t.count > 0 ? ` (${t.done}/${t.count})` : ''}</button>
          ))}
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <Bar val={allDone} max={allTotal||1} color={T.green} h={8} />
          <span style={{ fontSize:13, fontWeight:700, color:T.dim, whiteSpace:'nowrap' }}>{allDone}/{allTotal} done</span>
        </div>
      </div>

      {(tab==='chad' || tab==='joelle') && (
        <>
          <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:16 }}>
            {items[tab].length === 0 && <p style={{ color:T.dim, fontSize:14, textAlign:'center', padding:'32px 0' }}>No items yet — add one below</p>}
            {items[tab].map(item => (
              <div key={item.id} onClick={()=>toggle(tab, item.id)} style={{
                display:'flex', alignItems:'center', gap:14, cursor:'pointer',
                background: item.done ? T.greenBg : T.card, border:`1px solid ${item.done ? T.greenMid : T.border}`,
                borderRadius:14, padding:'14px 18px', transition:'all .15s'
              }}>
                <div style={{ width:22, height:22, borderRadius:7, border:`2px solid ${item.done ? T.green : T.border}`, background: item.done ? T.green : 'transparent', flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
                  {item.done && <span style={{ color:'#fff', fontSize:12, fontWeight:800 }}>✓</span>}
                </div>
                <p style={{ flex:1, fontSize:15, color: item.done ? T.dim : T.ink, textDecoration: item.done ? 'line-through' : 'none', lineHeight:1.4 }}>{item.text}</p>
                <button onClick={e=>{e.stopPropagation(); remove(tab, item.id);}} style={{ background:'none', border:'none', cursor:'pointer', color:T.border, fontSize:18, padding:'0 4px' }}>×</button>
              </div>
            ))}
          </div>
          <div style={{ display:'flex', gap:10 }}>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}
              placeholder={`Add an item for ${tab==='chad'?'Chad':'Joelle'}...`}
              style={{ flex:1, border:`1px solid ${T.border}`, borderRadius:14, padding:'13px 18px', fontSize:15, outline:'none', fontFamily:'inherit', background:T.card }}
            />
            <button onClick={add} style={{ background:T.green, color:'#fff', border:'none', borderRadius:14, padding:'13px 22px', fontSize:18, fontWeight:800, cursor:'pointer' }}>+</button>
          </div>
          {addError && <p style={{ fontSize:12, color:T.coral, marginTop:6 }}>{addError}</p>}
        </>
      )}

      {tab==='all' && (
        <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
          {['chad','joelle'].map(p => (
            <div key={p}>
              <p style={{ fontSize:12, fontWeight:800, letterSpacing:1.2, textTransform:'uppercase', color:T.dim, marginBottom:8 }}>{p==='chad'?'👦 Chad':'👩 Joelle'}</p>
              {items[p].length === 0 && <p style={{ color:T.dim, fontSize:13, padding:'8px 0 16px' }}>No items</p>}
              {items[p].map(item => (
                <div key={item.id} onClick={()=>toggle(p, item.id)} style={{
                  display:'flex', alignItems:'center', gap:12, cursor:'pointer', marginBottom:6,
                  background: item.done ? T.greenBg : T.card, border:`1px solid ${item.done ? T.greenMid : T.border}`,
                  borderRadius:12, padding:'12px 16px', transition:'all .15s'
                }}>
                  <div style={{ width:20, height:20, borderRadius:6, border:`2px solid ${item.done ? T.green : T.border}`, background: item.done ? T.green : 'transparent', flexShrink:0, display:'flex', alignItems:'center', justifyContent:'center' }}>
                    {item.done && <span style={{ color:'#fff', fontSize:11, fontWeight:800 }}>✓</span>}
                  </div>
                  <p style={{ flex:1, fontSize:14, color: item.done ? T.dim : T.ink, textDecoration: item.done ? 'line-through' : 'none' }}>{item.text}</p>
                </div>
              ))}
            </div>
          ))}
        </div>
      )}

      {tab==='goals' && (
        <div style={{ display:'flex', flexDirection:'column', gap:24 }}>
          <div>
            <p style={{ fontSize:12, fontWeight:800, letterSpacing:1, textTransform:'uppercase', color:T.dim, marginBottom:12 }}>Our 3 Priorities This Month</p>
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {priorities.map((p, i) => (
                <div key={i} style={{ display:'flex', alignItems:'center', gap:12, background:T.greenBg, border:`1px solid ${T.greenMid}`, borderRadius:14, padding:'14px 18px' }}>
                  <span style={{ fontSize:15, fontWeight:800, color:T.green, flexShrink:0 }}>#{i+1}</span>
                  <input value={p} onChange={e=>updatePriority(i, e.target.value)} placeholder={`Priority #${i+1}...`}
                    style={{ flex:1, border:'none', outline:'none', background:'transparent', fontFamily:'inherit', fontSize:15, color:T.ink }} />
                </div>
              ))}
            </div>
          </div>
          <div>
            <p style={{ fontSize:12, fontWeight:800, letterSpacing:1, textTransform:'uppercase', color:T.dim, marginBottom:8 }}>Session Notes</p>
            <p style={{ fontSize:13, color:T.dim, marginBottom:12 }}>Thoughts, tangents, things to remember — doesn't have to be budget-related.</p>
            <div style={{ display:'flex', flexDirection:'column', gap:0 }}>
              {notesList.map((n, i) => (
                <div key={n.id} style={{ display:'flex', alignItems:'flex-start', gap:10, padding:'10px 0', borderBottom:`1px solid ${T.border}` }}>
                  <span style={{ fontSize:13, color:T.dim, marginTop:2, width:20 }}>{i+1}.</span>
                  <p style={{ flex:1, fontSize:14, color:T.ink, lineHeight:1.5 }}>{n.text}</p>
                  <button onClick={()=>removeNote(n.id)} style={{ background:'none', border:'none', cursor:'pointer', color:T.border, fontSize:18, padding:'0 4px' }}>×</button>
                </div>
              ))}
            </div>
            <div style={{ display:'flex', gap:10, marginTop:14 }}>
              <input value={noteInput} onChange={e=>setNoteInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addNote()}
                placeholder="Add a note..."
                style={{ flex:1, border:`1px solid ${T.border}`, borderRadius:14, padding:'12px 18px', fontSize:14, outline:'none', fontFamily:'inherit', background:T.card }} />
              <button onClick={addNote} style={{ background:T.amber, color:'#fff', border:'none', borderRadius:14, padding:'12px 20px', fontSize:16, fontWeight:800, cursor:'pointer' }}>+</button>

            {addError && <p style={{ fontSize:12, color:T.coral, marginTop:6 }}>{addError}</p>}
          </div>
        </div>
      )}
    </div>
  );
};

// ─── PREP MODE ────────────────────────────────────────────────────────────────
const PrepMode = ({ onExit }) => {
  const [tab, setTab] = useState('balances');
  const [acct, setAcct] = useState({ ...D.accounts });
  const [sources, setSources] = useState(D.income.sources.map((s,i) => ({ ...s, _id: i })));
  const [fixedBills, setFixedBills] = useState(D.fixedBills);
  const [spending, setSpending] = useState(D.spending.map((s,i) => ({ ...s, _id: i })));
  const [upcomingNotes, setUpcomingNotes] = useState(INIT.upcomingNotes);
  const [todos, setTodos] = useState(INIT.todos);
  useEffect(() => { db.loadTodos().then(t => setTodos(t)); }, []);
  const [rollForward, setRollForward] = useState(true);
  const [clearNotes, setClearNotes] = useState(false);
  const [saved, setSaved] = useState(false);
  const [saving, setSaving] = useState(false);

  const incomeTotal = Math.round(sources.reduce((s, src) => s + (parseFloat(src.amt) || 0), 0));
  const variableSpend = spending.reduce((s, sp) => s + (parseFloat(sp.mo) || 0), 0);
  const deficit = incomeTotal - fixedBills - Math.round(variableSpend);

  const updateAcct = (k, v) => setAcct(a => ({ ...a, [k]: parseFloat(v) || 0 }));
  const updateSource = (id, k, v) => setSources(s => s.map(x => x._id===id ? { ...x, [k]: k==='amt' ? (parseFloat(v)||0) : v } : x));
  const addSource = () => setSources(s => [...s, { label:'New income source', amt:0, acct:'Billing', when:'Monthly', _id: Date.now() }]);
  const removeSource = (id) => setSources(s => s.filter(x => x._id !== id));
  const updateSpend = (id, k, v) => setSpending(s => s.map(x => x._id===id ? { ...x, [k]: k==='mo' ? (parseFloat(v)||0) : v } : x));
  const toggleTodoDone = (p, id) => setTodos(t => ({ ...t, [p]: t[p].map(i => i.id===id ? { ...i, done:!i.done } : i) }));

  const handleSave = async () => {
    if (saving) return;
    setSaving(true);
    try {
      const totalLiquid = Object.entries(acct)
        .filter(([k]) => ['billing','groceries','propertyTax','emergency','ordoWATB','baselane'].includes(k))
        .reduce((s,[,v]) => s + v, 0);
      const totalDebt = (acct.sapphire||0) + (acct.ink||0);
      const newAcct = { ...acct, totalLiquid: Math.round(totalLiquid*100)/100, totalDebt: Math.round(totalDebt*100)/100, netCash: Math.round((totalLiquid - totalDebt)*100)/100 };

      const newData = {
        accounts: newAcct,
        income: { total: incomeTotal, sources: sources.map(({ _id, ...rest }) => rest) },
        fixedBills,
        variableSpend: Math.round(variableSpend),
        deficit,
        spending: spending.map(({ _id, ...rest }) => rest),
      };

      const notesToSave = clearNotes ? ['','','','',''] : upcomingNotes;
      const rolledTodos = rollForward
        ? [
            ...todos.chad.filter(i => !i.done).map(i => ({ person: 'chad', text: i.text })),
            ...todos.joelle.filter(i => !i.done).map(i => ({ person: 'joelle', text: i.text })),
          ]
        : [];

      await Promise.all([
        db.saveBudgetData(newData),
        ...notesToSave.map((text, i) => db.saveUpcomingNote(i + 1, text)),
      ]);
      await db.newSession(rolledTodos);

      setSaved(true);
      setTimeout(() => window.location.reload(), 900);
    } catch (err) {
      console.error('Prep Mode save failed:', err);
      setSaving(false);
    }
  };

  const chadDone = todos.chad.filter(i=>i.done).length;
  const joelleDone = todos.joelle.filter(i=>i.done).length;
  const chadRoll = todos.chad.filter(i=>!i.done).length;
  const joelleRoll = todos.joelle.filter(i=>!i.done).length;

  const PREP_TABS = [
    { id:'balances', label:'💰 Balances' },
    { id:'income', label:'📥 Income' },
    { id:'bills', label:'🧾 Bills' },
    { id:'session', label:'✅ Last Session' },
    { id:'upcoming', label:'📌 Upcoming Notes' },
  ];

  const fieldStyle = { border:`1px solid ${T.border}`, borderRadius:10, padding:'9px 14px', fontSize:14, fontFamily:'inherit', outline:'none', background:T.card, color:T.ink, width:'100%' };
  const labelStyle = { fontSize:12, color:T.dim, fontWeight:700, marginBottom:4, display:'block' };
  const rowStyle = { display:'flex', justifyContent:'space-between', alignItems:'center', padding:'10px 0', borderBottom:`1px solid ${T.border}`, gap:12 };

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh', background:T.cream, overflow:'hidden' }}>
      {/* Header */}
      <div style={{ background:'#fff', borderBottom:`1px solid ${T.border}`, padding:'14px 40px', display:'flex', alignItems:'center', gap:16, flexShrink:0 }}>
        <button onClick={onExit} style={{ background:'none', border:`1px solid ${T.border}`, borderRadius:100, padding:'7px 18px', fontSize:13, cursor:'pointer', color:T.dim, fontWeight:600 }}>← Back</button>
        <div>
          <p style={{ fontWeight:800, fontSize:18 }}>🔧 Prep Mode</p>
          <p style={{ fontSize:12, color:T.dim }}>Update data before your next money date session</p>
        </div>
        <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:12 }}>
          {saved && <span style={{ fontSize:13, color:T.green, fontWeight:700 }}>✓ Saved! Reloading…</span>}

// ─── APP SHELL ────────────────────────────────────────────────────────────────
const SCREENS = [
  { id:'welcome',   label:'Home',            comp: null },
  { id:'picture',   label:'Big Picture',     comp: BigPicture },
  { id:'cashflow',  label:'Cash Flow',       comp: CashFlow },
  { id:'spending',  label:'Spending',        comp: Spending },
  { id:'debt',      label:'Debt',            comp: Debt },
  { id:'goals',     label:'Goals',           comp: Goals },
  { id:'decisions', label:'Big Decisions',   comp: BigDecisions },
  { id:'upcoming',  label:'Upcoming Changes',comp: UpcomingChanges },
  { id:'ourlist',   label:'Our Lists',       comp: OurListsScreen },
];

const HASH_ALIASES = { lists: 'ourlist' };
const hashToIdx = () => {
  try {
    const raw = window.location.hash.replace('#', '').toLowerCase();
    const id = HASH_ALIASES[raw] || raw;
    const i = SCREENS.findIndex(s => s.id === id);
    return i >= 0 ? i : null;
  } catch { return null; }
};

const App = () => {
  const [ready, setReady] = useState(false);
  const [idx, setIdx] = useState(() => {
    const fromHash = hashToIdx();
    if (fromHash !== null) return fromHash;
    try { return parseInt(localStorage.getItem('moneydate_screen') || '0', 10); } catch { return 0; }
  });
  const [prepMode, setPrepMode] = useState(false);

  useEffect(() => {
    db.init()
      .then(() => setReady(true))
      .catch(err => { console.error('Supabase init failed:', err); setReady(true); });
  }, []);

  useEffect(() => {
    const onHashChange = () => {
      const i = hashToIdx();
      if (i !== null) { setIdx(i); localStorage.setItem('moneydate_screen', i); }
    };
    window.addEventListener('hashchange', onHashChange);
    return () => window.removeEventListener('hashchange', onHashChange);
  }, []);

  const go = (n) => {
    const c = Math.max(0, Math.min(SCREENS.length-1, n));
    setIdx(c);
    localStorage.setItem('moneydate_screen', c);
    window.location.hash = SCREENS[c].id;
  };
  const S = SCREENS[idx];
  const isHome = idx === 0;

  if (!ready) return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100vh', background:'#FAF7F2', gap:16 }}>
      <p style={{ fontSize:36 }}>💚</p>
      <p style={{ fontFamily:"'Playfair Display', serif", fontSize:22, fontWeight:700, color:'#1C1C1E' }}>Cadence</p>
      <p style={{ fontSize:14, color:'#6B6B70' }}>Loading your money date…</p>
    </div>
  );

  if (prepMode) return <PrepMode onExit={() => setPrepMode(false)} />;

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh', background: T.cream, overflow:'hidden' }}>
      {!isHome && (
        <nav style={{ display:'flex', alignItems:'center', gap:4, padding:'10px 40px', borderBottom:`1px solid ${T.border}`, background:'#FFF', flexShrink:0, flexWrap:'wrap' }}>
          <button onClick={()=>go(0)} style={{ background:'none', border:'none', cursor:'pointer', color: T.dim, fontSize:13, fontWeight:600, padding:'4px 10px', borderRadius:100, marginRight:4 }}>💚 Cadence</button>
          <div style={{ width:1, height:16, background: T.border, marginRight:4 }} />
          {SCREENS.slice(1).map((s,i) => (
            <button key={s.id} onClick={()=>go(i+1)} style={{
              background: idx===i+1 ? T.ink : 'transparent', color: idx===i+1 ? '#fff' : T.dim,
              border:'none', borderRadius:100, padding:'5px 14px', fontSize:13,
              fontWeight: idx===i+1 ? 700 : 400, cursor:'pointer', transition:'all .15s'
            }}>{s.label}</button>
          ))}
          <span style={{ marginLeft:'auto', fontSize:12, color: T.dim, fontWeight:600 }}>{idx}/{SCREENS.length-1}</span>
        </nav>
      )}

      <div style={{ flex:1, overflowY:'auto' }}>
        {isHome ? <Welcome onStart={()=>go(1)} onPrep={()=>setPrepMode(true)} /> : S.comp ? <S.comp /> : null}
      </div>

      {!isHome && (
        <footer style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'12px 40px', borderTop:`1px solid ${T.border}`, background:'#FFF', flexShrink:0 }}>
          <button onClick={()=>go(idx-1)} disabled={idx<=1} style={{
            background:'none', border:`1px solid ${idx<=1 ? T.border : T.border}`, borderRadius:100,
            padding:'9px 22px', fontSize:14, cursor: idx<=1?'default':'pointer',
            color: idx<=1 ? T.border : T.ink, transition:'all .15s'
          }}>← Back</button>

          <div style={{ display:'flex', gap:6, alignItems:'center' }}>
            {SCREENS.slice(1).map((_,i) => (
              <div key={i} onClick={()=>go(i+1)} style={{
                width: i+1===idx ? 22 : 8, height:8, borderRadius:4,
                background: i+1===idx ? T.ink : T.border,
                cursor:'pointer', transition:'all .3s'
              }} />
            ))}
          </div>

          {idx < SCREENS.length-1
            ? <button onClick={()=>go(idx+1)} style={{ background: T.ink, color:'#fff', border:'none', borderRadius:100, padding:'9px 26px', fontSize:14, fontWeight:700, cursor:'pointer' }}>Next →</button>
            : <button onClick={()=>go(0)} style={{ background: T.green, color:'#fff', border:'none', borderRadius:100, padding:'9px 26px', fontSize:14, fontWeight:700, cursor:'pointer' }}>Start Over 🔄</button>
          }
        </footer>
      )}
    </div>
  );
};

    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  // Hide on Our Lists screen — it's already the full list view
  if (currentHash === 'ourlist' || currentHash === 'lists') return null;

  // Re-sync from Supabase when panel opens so changes from OurLists show up
  useEffect(() => {
    if (open) {
      setLoading(true);
      Promise.all([db.loadTodos(), db.loadPriorities(), db.loadNotes()]).then(([t, p, n]) => {
        setItems(t); setPriorities(p); setNotesList(n);
        setLoading(false);
      });
    }
  }, [open]);

  const add = async () => {
    const text = input.trim(); if (!text) return;
    try {
      const data = await db.addTodo(tab, text, items[tab].length);
      setItems(prev => ({ ...prev, [tab]: [...prev[tab], { id: data.id, text, done: false }] }));
      setInput('');
    } catch (err) {
      console.error('addTodo failed:', err);
      setAddError('Failed to save — check connection');
      setTimeout(() => setAddError(null), 4000);
    }
  };
  const toggle = (person, id) => {
    const done = !items[person].find(i => i.id === id).done;
    setItems(prev => ({ ...prev, [person]: prev[person].map(i => i.id === id ? { ...i, done } : i) }));
    db.toggleTodo(id, done);
  };
  const remove = (person, id) => {
    setItems(prev => ({ ...prev, [person]: prev[person].filter(i => i.id !== id) }));
    db.deleteTodo(id);
  };
  const updatePriority = (i, val) => {
    const n = [...priorities]; n[i] = val; setPriorities(n);
    db.savePriority(i + 1, val);
  };
  const addNote = async () => {
    const text = noteInput.trim(); if (!text) return;
    try {
      const data = await db.addNote(text, notesList.length);
      setNotesList(prev => [...prev, { id: data.id, text }]);
      setNoteInput('');
    } catch (err) {
      console.error('addNote failed:', err);
      setAddError('Failed to save — check connection');
      setTimeout(() => setAddError(null), 4000);
    }
  };
  const removeNote = (id) => {
    setNotesList(prev => prev.filter(n => n.id !== id));
    db.deleteNote(id);
  };

  const share = () => {
    const date = new Date().toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
    const lines = ['=== STEWART FAMILY MONEY DATE ===', date, ''];
    lines.push('--- CHAD\'S TO-DOS ---');
    if (items.chad.length) items.chad.forEach(i => lines.push((i.done ? '[x] ' : '[ ] ') + i.text));
    else lines.push('(none)');
    lines.push('');
    lines.push('--- JOELLE\'S TO-DOS ---');
    if (items.joelle.length) items.joelle.forEach(i => lines.push((i.done ? '[x] ' : '[ ] ') + i.text));
    else lines.push('(none)');
    lines.push('');
    lines.push('--- PRIORITIES ---');
    priorities.forEach((p, i) => { if (p.trim()) lines.push(`Goal #${i+1}: ${p}`); });
    lines.push('');
    if (notesList.length) {
      lines.push('--- NOTES ---');
      notesList.forEach((n, i) => lines.push(`${i+1}. ${n.text}`));
    }
    const text = lines.join('\n').trim();
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true); setTimeout(() => setCopied(false), 3000);
    }).catch(() => { window.prompt('Copy and paste to save:', text); });
  };

  const totalCount = items.chad.length + items.joelle.length;
  const doneCount = items.chad.filter(i=>i.done).length + items.joelle.filter(i=>i.done).length;

  const TABS = [
    { id:'chad', label:'👦 Chad' },
    { id:'joelle', label:'👩 Joelle' },
    { id:'goals', label:'📌 Goals' },
  ];

  return (
    <>
      <button onClick={() => setOpen(o => !o)} style={{
        position:'fixed', bottom: 76, right: 24, width: 52, height: 52, borderRadius:'50%',
        background: open ? T.ink : T.green, color:'#fff', border:'none', cursor:'pointer',
        fontSize: 20, boxShadow:'0 4px 16px rgba(0,0,0,0.18)', zIndex: 1000,
        display:'flex', alignItems:'center', justifyContent:'center', transition:'all .2s'
      }}>
        {open ? '✕' : '✅'}
        {!open && totalCount > 0 && (
          <span style={{ position:'absolute', top:-4, right:-4, background: T.coral, color:'#fff', borderRadius:'50%', width:18, height:18, fontSize:10, fontWeight:800, display:'flex', alignItems:'center', justifyContent:'center' }}>
            {totalCount - doneCount > 0 ? totalCount - doneCount : '✓'}
          </span>
        )}
      </button>

      {open && (
        <div style={{
          position:'fixed', bottom: 136, right: 24, width: 380, maxHeight: 560,
          background:'#fff', borderRadius: 20, boxShadow:'0 8px 40px rgba(0,0,0,0.18)',
          border:`1px solid ${T.border}`, zIndex: 999, display:'flex', flexDirection:'column', overflow:'hidden'
        }}>
          <div style={{ padding:'14px 18px 10px', borderBottom:`1px solid ${T.border}`, flexShrink:0 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
              <p style={{ fontWeight:800, fontSize:15 }}>💚 Cadence</p>
              {loading
                ? <span style={{ fontSize:11, color:T.dim }}>Syncing…</span>
                : <span style={{ fontSize:12, color:T.dim }}>{doneCount}/{totalCount} done</span>}
            </div>
            <div style={{ display:'flex', background:'#F4F1EC', borderRadius:10, padding:3, gap:2 }}>
              {TABS.map(t => (
                <button key={t.id} onClick={()=>setTab(t.id)} style={{
                  flex:1, background: tab===t.id ? '#fff' : 'transparent',
                  border:'none', borderRadius:8, padding:'5px 4px', fontSize:11.5, fontWeight:700,
                  color: tab===t.id ? T.ink : T.dim, cursor:'pointer', transition:'all .15s',
                  boxShadow: tab===t.id ? '0 1px 4px rgba(0,0,0,0.08)' : 'none', whiteSpace:'nowrap'
                }}>{t.label}{(t.id==='chad'||t.id==='joelle') && items[t.id].length > 0 ? ` (${items[t.id].filter(i=>i.done).length}/${items[t.id].length})` : ''}</button>
              ))}
            </div>
          </div>

          {(tab === 'chad' || tab === 'joelle') && (
            <>
              <div style={{ flex:1, overflowY:'auto', padding:'10px 16px' }}>
                {items[tab].length === 0 && <p style={{ fontSize:13, color:T.dim, textAlign:'center', padding:'20px 0' }}>No items yet — add one below</p>}
                {items[tab].map(item => (
                  <div key={item.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 4px', borderBottom:`1px solid ${T.border}` }}>
                    <div onClick={()=>toggle(tab, item.id)} style={{ width:20, height:20, borderRadius:6, border:`2px solid ${item.done ? T.green : T.border}`, background: item.done ? T.green : 'transparent', flexShrink:0, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}>
                      {item.done && <span style={{ color:'#fff', fontSize:11, fontWeight:800 }}>✓</span>}
                    </div>
                    <p style={{ flex:1, fontSize:13, color: item.done ? T.dim : T.ink, textDecoration: item.done ? 'line-through' : 'none', lineHeight:1.4 }}>{item.text}</p>
                    <button onClick={()=>remove(tab, item.id)} style={{ background:'none', border:'none', cursor:'pointer', color:T.border, fontSize:16, padding:'0 2px', lineHeight:1 }}>×</button>
                  </div>
                ))}
              </div>
              <div style={{ padding:'10px 14px', borderTop:`1px solid ${T.border}`, flexShrink:0 }}>
                {addError && <p style={{ fontSize:11, color:T.coral, marginBottom:6 }}>{addError}</p>}
                <div style={{ display:'flex', gap:8 }}>
                  <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()}
                    placeholder={`Add ${tab==='chad'?'Chad':'Joelle'}'s item...`}
                    style={{ flex:1, border:`1px solid ${T.border}`, borderRadius:10, padding:'8px 12px', fontSize:13, outline:'none', fontFamily:'inherit' }} />
                  <button onClick={add} style={{ background:T.green, color:'#fff', border:'none', borderRadius:10, padding:'8px 14px', fontSize:13, fontWeight:700, cursor:'pointer' }}>+</button>
                </div>
              </div>
            </>
          )}

          {tab === 'goals' && (
            <div style={{ flex:1, overflowY:'auto', padding:'14px 16px' }}>
              <p style={{ fontSize:11, fontWeight:800, letterSpacing:1, textTransform:'uppercase', color:T.dim, marginBottom:10 }}>Our 3 Priorities</p>
              <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:18 }}>
                {priorities.map((p, i) => (
                  <div key={i} style={{ display:'flex', alignItems:'center', gap:10, background:T.greenBg, border:`1px solid ${T.greenMid}`, borderRadius:12, padding:'10px 14px' }}>
                    <span style={{ fontSize:13, fontWeight:800, color:T.green, flexShrink:0 }}>#{i+1}</span>
                    <input value={p} onChange={e=>updatePriority(i, e.target.value)} placeholder={`Priority #${i+1}...`}
                      style={{ flex:1, border:'none', outline:'none', background:'transparent', fontFamily:'inherit', fontSize:13, color:T.ink }} />
                  </div>
                ))}
              </div>
              <p style={{ fontSize:11, fontWeight:800, letterSpacing:1, textTransform:'uppercase', color:T.dim, marginBottom:8 }}>Notes</p>
              {notesList.map((n, i) => (
                <div key={n.id} style={{ display:'flex', alignItems:'flex-start', gap:8, padding:'8px 4px', borderBottom:`1px solid ${T.border}` }}>
                  <span style={{ fontSize:12, color:T.dim, marginTop:2, flexShrink:0 }}>{i+1}.</span>
                  <p style={{ flex:1, fontSize:13, color:T.ink, lineHeight:1.4 }}>{n.text}</p>
                  <button onClick={()=>removeNote(n.id)} style={{ background:'none', border:'none', cursor:'pointer', color:T.border, fontSize:16, padding:'0 2px', lineHeight:1 }}>×</button>
                </div>
              ))}
              {addError && <p style={{ fontSize:11, color:T.coral, margin:'4px 0' }}>{addError}</p>}
              <div style={{ display:'flex', gap:8, marginTop:10 }}>
                <input value={noteInput} onChange={e=>setNoteInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addNote()}
                  placeholder="Add a note..."
                  style={{ flex:1, border:`1px solid ${T.border}`, borderRadius:10, padding:'8px 12px', fontSize:13, outline:'none', fontFamily:'inherit' }} />
                <button onClick={addNote} style={{ background:T.amber, color:'#fff', border:'none', borderRadius:10, padding:'8px 14px', fontSize:13, fontWeight:700, cursor:'pointer' }}>+</button>
              </div>
            </div>
          )}

          <div style={{ padding:'10px 14px 14px', borderTop:`1px solid ${T.border}`, flexShrink:0 }}>
            <button onClick={share} style={{
              width:'100%', background: copied ? T.greenBg : T.ink, color: copied ? T.green : '#fff',
              border:`1px solid ${copied ? T.greenMid : T.ink}`, borderRadius:12, padding:'10px',
              fontSize:13, fontWeight:700, cursor:'pointer', transition:'all .2s'
            }}>{copied ? '✓ Copied!' : '📋 Export session'}</button>
          </div>
        </div>
      )}
    </>
  );
};


// Inject OurList into App
const AppWithList = () => (
  <>
    <App />
    <OurList />
  </>
);

ReactDOM.createRoot(document.getElementById('root')).render(<AppWithList />);
</script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#173528"/>
      <stop offset="100%" stop-color="#2A8B68"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="url(#bg)"/>
  <!-- C letterform: 244° arc, gap centred on right -->
  <circle cx="50" cy="50" r="29"
    fill="none"
    stroke="#FAF7F2"
    stroke-width="15"
    stroke-dasharray="123.6 58.6"
    transform="rotate(58 50 50)"/>
  <!-- Amber period dot, clear spacing below the arc -->
  <circle cx="74" cy="88" r="4" fill="#C07A12"/>
</svg>
